services:
  - type: web
    name: simulador-cartas
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py --host 0.0.0.0
    envVars:
      - key: SIMULADOR_UPDATE_PASSWORD
        sync: false
    disk:
      name: simulador-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
